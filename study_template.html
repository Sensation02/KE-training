<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>L3 Full-stack</title>
PWA_HEAD_PLACEHOLDER
<style>
/* ============ Дизайн-токени ============ */
:root{
  --bg:#0d0f14; --bg-soft:#12151d; --panel:#161a23; --card:#191d28;
  --card-hi:#1e2330; --border:#262c3a; --border-soft:#1f2430;
  --text:#e7e9ef; --dim:#9aa2b1; --mute:#666e7e;
  --accent:#7c6cff; --accent-2:#22d3ee; --accent-soft:rgba(124,108,255,.16);
  --good:#34d399; --good-soft:rgba(52,211,153,.15);
  --warn:#fbbf24; --warn-soft:rgba(251,191,36,.15);
  --deep:#c084fc; --mid:#60a5fa; --aware:#34d399;
  --code-bg:#0e1017; --code-line:#20242f;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 30px rgba(0,0,0,.28);
  --radius:16px;
  --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
}
[data-theme="light"]{
  --bg:#f4f5f8; --bg-soft:#ffffff; --panel:#ffffff; --card:#ffffff;
  --card-hi:#f7f8fa; --border:#e3e6ec; --border-soft:#edeff3;
  --text:#181b22; --dim:#5b6270; --mute:#8a919e;
  --accent:#6d4dff; --accent-soft:rgba(109,77,255,.1);
  --good:#0f9d58; --warn:#c07c00;
  --deep:#8b5cf6; --mid:#2563eb; --aware:#0f9d58;
  --shadow:0 1px 2px rgba(20,30,50,.05),0 8px 24px rgba(20,30,50,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.55;-webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s}
::selection{background:var(--accent-soft)}

/* ============ Каркас ============ */
.app{max-width:1000px;margin:0 auto;padding:0 18px calc(90px + env(safe-area-inset-bottom))}

.topbar{display:flex;align-items:center;flex-wrap:wrap;gap:12px 16px;padding:22px 0 18px;
  position:sticky;top:0;z-index:20;background:var(--bg)}
.brand{display:flex;flex-direction:column;gap:2px;flex:0 1 auto;min-width:0}
.brand .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--accent)}
.brand h1{font-size:clamp(19px,3.4vw,25px);font-weight:700;letter-spacing:-.02em;line-height:1.1}
/* авто-відступи з обох боків центрують прогрес між брендом ліворуч і діями праворуч */
.overall{display:flex;align-items:center;gap:11px;flex:none;margin-inline:auto}
.topbar-actions{display:flex;gap:12px;flex:none}
.ring{--p:0;position:relative;width:46px;height:46px;border-radius:50%;flex:none;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--border) 0);transition:background .5s}
.ring::after{content:"";position:absolute;inset:5px;background:var(--bg);border-radius:50%}
.ring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:1;font-size:12px;font-weight:700}
.overall .otext{font-size:12px;color:var(--dim);line-height:1.25}
.overall .otext b{color:var(--text);font-size:13px}
.icon-btn{flex:none;width:40px;height:40px;border-radius:11px;border:1px solid var(--border);
  background:var(--panel);color:var(--dim);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:.16s}
.icon-btn:hover{color:var(--text);border-color:var(--accent);transform:translateY(-1px)}
.nav-back{flex:none;width:40px;height:40px;border-radius:11px;border:1px solid var(--border);
  background:var(--panel);color:var(--dim);cursor:pointer;font-size:20px;text-decoration:none;
  display:flex;align-items:center;justify-content:center;transition:.16s}
.nav-back:hover{color:var(--text);border-color:var(--accent);transform:translateY(-1px)}
.session-banner{display:none;position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));
  transform:translateX(-50%);z-index:50;flex-wrap:wrap;
  align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:1px solid var(--warn);
  background:var(--panel);color:var(--text);box-shadow:var(--shadow);font-size:13.5px;
  max-width:calc(100vw - 32px)}
.session-banner.visible{display:flex}
.session-banner button{flex:none;font-family:var(--font);font-size:13px;font-weight:600;
  padding:7px 12px;border-radius:9px;border:1px solid var(--warn);background:var(--warn-soft);
  color:var(--warn);cursor:pointer}

/* ============ Вкладки ============ */
.tabs{display:flex;gap:6px;padding:5px;background:var(--panel);border:1px solid var(--border);
  border-radius:14px;margin-bottom:22px;box-shadow:var(--shadow)}
.tab{flex:1;padding:11px 8px;border:none;background:none;color:var(--dim);cursor:pointer;
  border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:.16s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px var(--accent-soft)}
.tab .cnt{font-family:var(--mono);font-size:11px;opacity:.85;
  background:rgba(255,255,255,.16);padding:1px 6px;border-radius:20px}
.tab:not(.active) .cnt{background:var(--card-hi);color:var(--mute)}

.view{display:none} .view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ============ Фільтри ============ */
.filters{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.search{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);
  background:var(--panel);color:var(--text);font-family:var(--font);font-size:14.5px;outline:none;transition:.16s}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search::placeholder{color:var(--mute)}
.chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:10px;
  border:1px solid var(--border);background:var(--panel);color:var(--text);cursor:pointer;
  font-size:12.5px;font-weight:500;transition:.14s;user-select:none}
.chip:hover{transform:translateY(-1px)}
.chip.off{opacity:.4;filter:saturate(.5)}
.chip .dot{width:9px;height:9px;border-radius:50%;flex:none}
.chip .n{font-family:var(--mono);font-size:10.5px;color:var(--mute)}
.dot.deep{background:var(--deep)} .dot.mid{background:var(--mid)} .dot.aware{background:var(--aware)}
.toggle{margin-left:auto;font-size:12.5px;color:var(--dim);display:inline-flex;align-items:center;
  gap:7px;cursor:pointer;user-select:none}
.toggle input{accent-color:var(--accent);width:15px;height:15px}

/* ============ Векторні іконки: розміри під контекст ============ */
.icon-btn svg{width:18px;height:18px;display:block}
.nav-back svg{width:20px;height:20px;display:block}
.tab-ic{display:inline-flex} .tab-ic svg{width:16px;height:16px;display:block}
/* line-height:1 стискає line-box до розміру гліфів, щоб іконка/kbd/крапка
   збігалися з ОПТИЧНИМ центром тексту, а не з центром високого line-box */
button.mini-btn,.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;line-height:1}
.mini-btn svg,.btn svg{width:15px;height:15px;display:block;flex:none}
.tab,.chip,.pill.depth{line-height:1}
.pill.depth .dbadge{margin-top:0} /* скидаємо зсув, потрібний лише в .q-head */
.exam-label svg{width:14px;height:14px;display:block;flex:none}
.empty .big svg{width:42px;height:42px;stroke-width:1.5;color:var(--mute);display:inline-block}
/* поле пошуку з іконкою-лупою */
.search-wrap{position:relative}
.search-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mute);
  display:flex;pointer-events:none}
.search-ic svg{width:16px;height:16px;display:block}
.search-wrap .search{padding-left:42px}
/* чип-перемикач «приховати вивчені» — у стилі .chip, активний залито акцентом */
.chip-toggle{margin-left:auto;font-family:var(--font)}
.chip-toggle .chip-ic{display:inline-flex} .chip-toggle .chip-ic svg{width:14px;height:14px;display:block}
.chip-toggle.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ============ Читалка ============ */
.cat{margin-bottom:10px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--card);box-shadow:var(--shadow)}
.cat-head{display:flex;align-items:center;gap:13px;padding:15px 17px;cursor:pointer;user-select:none}
.cat-bar{width:4px;align-self:stretch;border-radius:3px;flex:none}
.cat-name{font-size:16px;font-weight:700;letter-spacing:-.01em;flex:1;min-width:0}
.cat-meta{font-family:var(--mono);font-size:11px;color:var(--dim);flex:none;text-align:right}
.cat-meta .mini{width:74px;height:5px;background:var(--border);border-radius:20px;overflow:hidden;margin-top:5px}
.cat-meta .mini i{display:block;height:100%;background:var(--good);border-radius:20px;transition:width .4s}
.chev{flex:none;color:var(--mute);transition:.22s;font-size:12px}
.cat.closed .chev{transform:rotate(-90deg)}
.cat.closed .items{display:none}
.items{border-top:1px solid var(--border-soft)}

.q{border-top:1px solid var(--border-soft)}
.q:first-child{border-top:none}
.q-head{display:flex;align-items:flex-start;gap:12px;padding:10px 17px;cursor:pointer}
.q-head:hover{background:var(--card-hi)}
.dbadge{flex:none;margin-top:3px;width:9px;height:9px;border-radius:50%}
.dbadge.deep{background:var(--deep)} .dbadge.mid{background:var(--mid)} .dbadge.aware{background:var(--aware)}
.q-title{flex:1;font-size:14.5px;min-width:0;font-weight:500}
.q-title .id{font-family:var(--mono);font-size:11px;color:var(--mute);margin-right:7px}
.status{flex:none;font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:8px;
  border:1px solid var(--border);background:var(--panel);color:var(--mute);cursor:pointer;
  white-space:nowrap;transition:.14s}
.status:hover{border-color:var(--accent)}
.status.learning{color:var(--warn);border-color:var(--warn);background:var(--warn-soft)}
.status.known{color:var(--good);border-color:var(--good);background:var(--good-soft)}
.copy-btn{flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;background:none;cursor:pointer;padding:5px;border-radius:8px;
  color:var(--mute);opacity:.6;transition:.14s}
.copy-btn svg{display:block;width:15px;height:15px}
.copy-btn:hover{opacity:1;background:var(--panel);border-color:var(--border)}
.copy-btn.copied{opacity:1;color:var(--good);border-color:var(--good);background:var(--good-soft)}
.answer{display:none;padding:2px 17px 16px 17px;font-size:14.5px}
.q.open .answer{display:block;animation:fade .2s}
.q.open .q-head{background:var(--card-hi);position:sticky;top:var(--stick-top,86px);z-index:5}

.empty{text-align:center;padding:60px 20px;color:var(--mute)}
.empty .big{font-size:34px;margin-bottom:10px}

/* ============ Блок «🎯 Відповідь на іспиті» ============ */
.exam{border:1px solid var(--accent);background:var(--accent-soft);
  border-radius:12px;padding:11px 13px;margin-bottom:11px}
.exam-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--accent);margin-bottom:7px;font-weight:600;
  display:flex;align-items:center;gap:6px;line-height:1}
.full-toggle{text-align:center;padding-top:14px}

/* ============ Флеш-картки ============ */
.deck-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
.deck-bar{width:100%;display:flex;align-items:center;gap:14px;justify-content:center;
  font-family:var(--mono);font-size:12px;color:var(--dim);flex-wrap:wrap}
.deck-bar .prog{flex:1;min-width:120px;height:6px;background:var(--border);border-radius:20px;overflow:hidden}
.deck-bar .prog i{display:block;height:100%;background:var(--accent);border-radius:20px;transition:width .3s}
.card{width:100%;min-height:340px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;box-shadow:var(--shadow);padding:26px 26px 22px;display:flex;flex-direction:column}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
  padding:4px 9px;border-radius:20px;border:1px solid var(--border);color:var(--dim)}
.pill.depth{display:inline-flex;align-items:center;gap:6px}
.card-q{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.card-a{margin-top:18px;padding-top:18px;border-top:1px dashed var(--border);font-size:14.5px}
.reveal-hint{margin-top:auto;padding-top:22px;text-align:center;color:var(--mute);font-size:13px}
/* єдиний скрол — сторінки; кнопки Знаю/Повторити липнуть до низу екрана,
   поки картка не доскролена, тож не губляться на довгому «Повному розборі» */
.deck-actions{display:flex;gap:12px;width:100%;margin-top:auto;
  position:sticky;bottom:0;background:var(--card);padding-top:16px;
  box-shadow:0 -14px 18px -6px var(--card)}
.btn{flex:1;padding:14px;border-radius:13px;border:1px solid var(--border);background:var(--panel);
  color:var(--text);font-family:var(--font);font-size:14.5px;font-weight:600;cursor:pointer;transition:.14s;
  display:flex;align-items:center;justify-content:center;gap:9px}
.btn:hover{transform:translateY(-1px)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.repeat{color:var(--warn);border-color:var(--warn)}
.btn.know{color:var(--good);border-color:var(--good)}
.btn kbd{font-family:var(--mono);font-size:10px;opacity:.7;border:1px solid currentColor;
  border-radius:5px;padding:1px 5px;line-height:1}
.deck-controls{width:100%;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  justify-content:center;font-size:12.5px}
.mini-btn,select.mini-btn{font-family:var(--mono);font-size:11px;padding:7px 11px;border-radius:9px;
  border:1px solid var(--border);background:var(--panel);color:var(--dim);cursor:pointer;transition:.14s}
.mini-btn:hover{color:var(--text);border-color:var(--accent)}

/* ============ Чеклист ============ */
.chk-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;font-size:12.5px;color:var(--dim)}
.chk-legend span{display:inline-flex;align-items:center;gap:7px}
.chk-cat{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--card);overflow:hidden;box-shadow:var(--shadow)}
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:12px 17px;border-top:1px solid var(--border-soft);
  cursor:pointer;transition:.12s}
.chk-item:hover{background:var(--card-hi)}
.chk-box{flex:none;width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);
  margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;
  color:transparent;transition:.14s}
.chk-item.done .chk-box{background:var(--good);border-color:var(--good);color:#fff}
.chk-item.done .chk-text{color:var(--mute);text-decoration:line-through}
.chk-text{flex:1;font-size:14px}
.chk-text .dbadge{display:inline-block;margin:0 8px 0 0;vertical-align:middle}
.chk-refs{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}
.qref{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:20px;
  border:1px solid var(--border);background:var(--panel);color:var(--mute);cursor:pointer;
  transition:.14s;line-height:1.5}
.qref:hover{border-color:var(--accent);color:var(--text);transform:translateY(-1px)}
.qref.learning{color:var(--warn);border-color:var(--warn);background:var(--warn-soft)}
.qref.known{color:var(--good);border-color:var(--good);background:var(--good-soft)}
.chk-item.done .chk-refs .qref{text-decoration:none}

/* ============ Рендер Markdown ============ */
.md>*{margin-bottom:9px} .md>*:last-child{margin-bottom:0}
.md p{color:var(--text)}
.md strong{font-weight:700} .md em{font-style:italic}
.md a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-soft)}
.md a:hover{border-bottom-color:var(--accent)}
.md code{font-family:var(--mono);font-size:.86em;background:var(--code-bg);color:#e6b3ff;
  padding:2px 6px;border-radius:6px;border:1px solid var(--code-line)}
.md ul,.md ol{padding-left:22px} .md li{margin-bottom:5px}
.md ul ul,.md ol ol,.md ul ol,.md ol ul{margin-top:5px;margin-bottom:0}
.md blockquote{border-left:3px solid var(--accent);padding:4px 0 4px 15px;color:var(--dim);
  background:var(--accent-soft);border-radius:0 8px 8px 0}
.md hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.md .code{position:relative;background:var(--code-bg);border:1px solid var(--code-line);
  border-radius:11px;overflow:hidden}
.md .code .lang{position:absolute;top:0;right:0;font-family:var(--mono);font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--mute);background:var(--code-line);
  padding:3px 9px;border-radius:0 0 0 8px}
.md pre{margin:0;padding:14px 16px;overflow-x:auto}
.md pre code{background:none;border:none;padding:0;color:#c9d1e3;font-size:12.6px;line-height:1.65}
.md table{width:100%;border-collapse:collapse;font-size:13px;display:block;overflow-x:auto}
.md th,.md td{border:1px solid var(--border);padding:8px 11px;text-align:left;vertical-align:top}
.md th{background:var(--card-hi);font-weight:600}
/* підсвітка синтаксису */
.t-c{color:#5f6b7d;font-style:italic} .t-s{color:#7ee787} .t-k{color:#ff9ecb}

.footer{text-align:center;margin-top:34px;font-size:11.5px;color:var(--mute);font-family:var(--mono)}

/* планшет і вужче — більші контроли Флеш-карток (зручніший тап) */
@media (max-width:900px){
  .deck-controls{gap:10px}
  .deck-controls .mini-btn,.deck-controls select.mini-btn,.deck-controls .chip-toggle{
    font-size:14px;padding:12px 16px;border-radius:11px}
  .deck-controls .mini-btn svg,.deck-controls .chip-toggle .chip-ic svg{width:16px;height:16px}
}

@media (max-width:560px){
  .app{padding:0 7px calc(70px + env(safe-area-inset-bottom))}
  .filters{gap:8px;margin-bottom:14px}
  .chip{flex:none;padding:9px 13px;font-size:13.5px;gap:7px}
  #catChips,#depthChips{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
    min-width:0;margin:0 -7px;padding:0 7px}
  #catChips::-webkit-scrollbar,#depthChips::-webkit-scrollbar{display:none}
  .toggle{padding:2px 0}
  .topbar{padding:16px 0 14px;gap:10px}
  .brand{flex:1 1 100%;order:1}
  .nav-back{order:2}
  .overall{order:3}
  .topbar-actions{order:4;gap:10px}
  /* більші тап-цілі на телефонах */
  .icon-btn,.nav-back{width:44px;height:44px;font-size:19px}
  .tabs{gap:5px;padding:5px}
  .tab{font-size:14.5px;padding:14px 6px;gap:6px}
  .tab .cnt{display:none}
  .card{padding:16px 13px;min-height:300px}
  .card-q{font-size:18px}
  .status{padding:7px 11px;font-size:11.5px}
  .cat-head{padding:13px 12px}
  .cat-meta .mini{width:56px}
  .q-head{padding:12px 12px}
  .answer{padding:2px 12px 18px 12px}
  .chk-item{padding:12px 12px}
  .session-banner{max-width:calc(100vw - 14px)}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a class="nav-back" href="/" title="До вибору рівня" aria-label="До вибору рівня" data-icon="arrow-left"></a>
    <div class="brand">
      <div class="eyebrow">InterCode · Competency Matrix</div>
      <h1>L3 Full-stack</h1>
    </div>
    <div class="overall" title="Загальний прогрес (вивчені питання)">
      <div class="ring" id="ring"><b id="ringPct">0%</b></div>
      <div class="otext"><b id="knownN">0</b>&nbsp;/&nbsp;<span id="totalN">0</span><br>вивчено</div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="themeBtn" title="Світла / темна тема" aria-label="Перемкнути тему"></button>

<script>
window.__DATA__ = JSON_DATA_PLACEHOLDER;
window.__LEVEL__ = LEVEL_KEY_PLACEHOLDER;
</script>
<script>
(function(){
"use strict";
const DATA = window.__DATA__;
// ключ localStorage містить рівень — прогрес різних рівнів на одному origin не перетирається
const LS_KEY = window.__LEVEL__ + '_study_v1';
const OWNER_KEY = 'study_owner_v1';
// Тема спільна для всіх сторінок origin (коренева + рівні). Навмисно НЕ
// підпадає під clearLocalProgress: це косметика пристрою, а не прогрес.
const THEME_KEY = 'study_theme_v1';
// Прибирає прогрес УСІХ рівнів: localStorage спільний на origin, тож зміна
// акаунта стосується l2/l3/... одразу, а не лише відкритого рівня.
function clearLocalProgress(){
  Object.keys(localStorage)
    .filter(k => k.endsWith('_study_v1') || k.endsWith('_study_v1_synced'))
    .forEach(k => localStorage.removeItem(k));
}

const DEPTH_LABEL = {deep:'Добре знати', mid:'Знати', aware:'Поверхнево'};
const DEPTH_ORDER = ['deep','mid','aware'];
const CAT_COLOR = {'front-end':'#f59e0b','back-end':'#ec4899','databases':'#14b8a6',
  'code-delivery':'#f97316','methodology':'#8b5cf6'};

/* ---------- Стан / localStorage ---------- */
function load(){
  let st;
  try{
    st = Object.assign({theme:'dark',tab:'reader',q:{},chk:{},updatedAt:0},
      JSON.parse(localStorage.getItem(LS_KEY)||'{}'));
  }catch(e){ st = {theme:'dark',tab:'reader',q:{},chk:{},updatedAt:0}; }
  // спільний ключ має пріоритет; st.theme лишається фолбеком для міграції
  // зі старих збережених станів (до появи THEME_KEY)
  st.theme = localStorage.getItem(THEME_KEY) || st.theme;
  return st;
}
let state = load();
// save() — для косметичних полів (тема/вкладка/згорнуті категорії): лише локально,
// без мітки часу й без синку. saveProgress() — для прогресу (статуси питань/чеклист):
// оновлює updatedAt і шле в чергу на сервер. Розділ навмисний: перемикання вкладки під
// час init() викликає save() для стартового стану, і воно не повинне виглядати як "зміна
// прогресу щойно зараз" — інакше зіб'ється порівняння updatedAt із сервером при синку.
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function saveProgress(){
  state.updatedAt = Date.now();
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  queueSync();
}

/* ============================================================
   СИНХРОНІЗАЦІЯ З СЕРВЕРОМ (Cloudflare Pages Function /api/state)
   ============================================================ */
const BADGE_TXT = {
  saved:'✓ збережено', syncing:'…синхронізація',
  offline:'офлайн', needlogin:'потрібен вхід', error:'⚠ помилка синку'
};
function setBadge(kind){
  const el = document.getElementById('syncBadge');
  if(!el) return;
  el.className = 'sync-badge ' + kind;
  el.textContent = BADGE_TXT[kind] || '';
}
function showSessionBanner(){
  const el = document.getElementById('sessionBanner');
  if(el) el.classList.add('visible');
}
(function(){
  const btn = document.getElementById('sessionReloadBtn');
  if(btn) btn.onclick = () => location.reload();
})();
function sameHost(url){
  try{ return new URL(url, location.href).hostname === location.hostname; }
  catch(e){ return true; }
}
const apiUrl = () => '/api/state?level=' + encodeURIComponent(window.__LEVEL__);

// known > learning > (немає ключа = нове) — при union-злитті беремо "сильніший" статус.
const Q_RANK = {learning:1, known:2};
function unionQ(a, b){
  a = a || {}; b = b || {};
  const out = {}, keys = new Set(Object.keys(a).concat(Object.keys(b)));
  keys.forEach(k=>{
    const st = (Q_RANK[a[k]]||0) >= (Q_RANK[b[k]]||0) ? a[k] : b[k];
    if(st) out[k] = st;
  });
  return out;
}
function unionChk(a, b){
  a = a || {}; b = b || {};
  const out = {}, keys = new Set(Object.keys(a).concat(Object.keys(b)));
  keys.forEach(k=>{ if(a[k] || b[k]) out[k] = true; });
  return out;
}

// До відповіді на початковий GET нічого не шлемо PUT: інакше debounce (нижче),
// запущений ще до узгодження з сервером, міг би відправити локальний стан і
// затерти на сервері щось новіше з іншого пристрою ще до рішення union/LWW.
let syncArmed = false;
let syncTimer = null;
function queueSync(){
  if(!syncArmed) return;
  setBadge('syncing');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(pushNow, 1500);
}

let pushInFlight = false, pushAgain = false;
async function pushNow(){
  if(pushInFlight){ pushAgain = true; return false; }
  pushInFlight = true;
  let res;
  try{
    res = await fetch(apiUrl(), {
      method:'PUT', credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(state)
    });
  }catch(e){
    pushInFlight = false;
    if(pushAgain){ pushAgain = false; return pushNow(); }
    setBadge('offline');
    return false;
  }
  pushInFlight = false;
  if(pushAgain){ pushAgain = false; return pushNow(); }
  if(res.redirected && !sameHost(res.url)){ setBadge('needlogin'); showSessionBanner(); return false; }
  if(res.status===401 || res.status===403){ setBadge('needlogin'); showSessionBanner(); return false; }
  if(res.status===503){ setBadge('offline'); return false; }
  if(res.status>=500){ setBadge('error'); return false; }
  if(!res.ok){ setBadge('error'); return false; }
  setBadge('saved');
  return true;
}

async function syncOnLoad(){
  let res;
  try{
    res = await fetch(apiUrl(), { credentials:'same-origin' });
  }catch(e){
    setBadge('offline'); syncArmed = true; return;
  }
  if(res.redirected && !sameHost(res.url)){ setBadge('needlogin'); showSessionBanner(); syncArmed = true; return; }
  if(res.status===401 || res.status===403){ setBadge('needlogin'); showSessionBanner(); syncArmed = true; return; }
  if(res.status===503){ setBadge('offline'); syncArmed = true; return; } // KV не піднято — тихий локальний режим
  if(res.status>=500){ setBadge('error'); syncArmed = true; return; }
  if(!res.ok){ setBadge('error'); syncArmed = true; return; }

  // Owner guard: якщо локальний стан належить іншому користувачу (акаунт на
  // цьому пристрої змінився — кнопкою виходу чи після протермінування сесії),
  // скидаємо чужий прогрес ДО union/LWW — інакше він злився б у серверний
  // стан нового користувача або перезаписав його.
  const owner = decodeURIComponent(res.headers.get('X-Study-User') || '');
  const prevOwner = localStorage.getItem(OWNER_KEY);
  if(owner && prevOwner && owner !== prevOwner){
    clearLocalProgress(); // знімає і прапорець _synced → нижче спрацює гілка "перший синк"
    state = {theme:state.theme, tab:'reader', q:{}, chk:{}, updatedAt:0}; // тема — косметика пристрою, лишається
    renderReader(); renderCheck(); refreshProgress(); rebuildDeck();
  }
  if(owner) localStorage.setItem(OWNER_KEY, owner);

  let remote = {};
  try{ remote = await res.json(); }catch(e){ /* лишаємо {} */ }

  if(!localStorage.getItem(LS_KEY + '_synced')){
    // перший синк на цьому пристрої — union-злиття (рішення користувача).
    // Беремо ЖИВИЙ state.q/chk (не знімок до init()): якщо користувач встиг
    // щось відмітити, поки GET летів, це теж має увійти в об'єднання.
    state.q = unionQ(state.q, remote.q);
    state.chk = unionChk(state.chk, remote.chk);
    state.updatedAt = Date.now();
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    // прапорець ставимо одразу, не чекаючи успіху PUT — інакше невдалий PUT
    // назавжди тримав би пристрій у режимі union замість LWW.
    localStorage.setItem(LS_KEY + '_synced', '1');
    renderReader(); renderCheck(); refreshProgress();
    setBadge('syncing');
    pushNow();
  }else{
    const remoteUpdatedAt = remote.updatedAt || 0;
    if(remoteUpdatedAt > (state.updatedAt || 0)){
      // сервер новіший — приймаємо серверний прогрес (тема/вкладка лишаються локальними,
      // це косметика окремого пристрою, а не частина прогресу, що синкається)
      state.q = remote.q || {};
      state.chk = remote.chk || {};
      state.updatedAt = remoteUpdatedAt;
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      renderReader(); renderCheck(); refreshProgress();
      setBadge('saved');
    }else if((state.updatedAt || 0) > remoteUpdatedAt){
      // локальний новіший — лишаємо як є, наздоганяємо сервер
      setBadge('syncing');
      pushNow();
    }else{
      setBadge('saved');
    }
  }
  syncArmed = true;
}

function qkey(cat,q){ return cat.key+':'+q.id; }
function qstatus(k){ return state.q[k] || 'new'; }
function setStatus(k,s){ if(s==='new') delete state.q[k]; else state.q[k]=s; saveProgress(); refreshProgress(); }
const $ = s => document.querySelector(s);

// швидкий доступ до питання за ключем 'section:QN' (посилання з чеклиста)
const Q_BY_KEY = {};
DATA.categories.forEach(cat=>cat.questions.forEach(q=>{ Q_BY_KEY[qkey(cat,q)] = {cat,q}; }));

// Перехід «покажи це питання в читалці»: скидає фільтри (щоб питання точно
// було видиме), відкриває категорію і саме питання, скролить до нього.
function openQuestion(key){
  const hit = Q_BY_KEY[key];
  if(!hit) return;
  filter = {cats:new Set(DATA.categories.map(c=>c.key)), depths:new Set(DEPTH_ORDER),
    search:'', hideKnown:false};
  $('#search').value = '';
  syncHideKnownChip();
  buildChips();
  state['open_'+hit.cat.key] = true; save();
  renderReader();
  switchTab('reader');
  const qEl = document.querySelector('.q[data-k="'+key+'"]');
  if(!qEl) return;
  if(!qEl.classList.contains('open')) qEl.querySelector('.q-head').click(); // клік сам доскролить
  else scrollQuestionToTop(qEl);
}

// Скрол «запитання під липкий топбар». Заголовок відкритого запитання липкий
// (.q.open .q-head, top:--stick-top), тож після цього скролу він лишається
// зафіксованим зверху, а відповідь читається з початку.
function scrollQuestionToTop(qEl){
  const offset = parseInt(getComputedStyle(document.documentElement)
    .getPropertyValue('--stick-top')) || 86;
  window.scrollTo({top: scrollY + qEl.getBoundingClientRect().top - offset, behavior:'smooth'});
}

function knownCount(){
  let n=0;
  for(const c of DATA.categories) for(const q of c.questions)
    if(state.q[qkey(c,q)]==='known') n++;
  return n;
}

/* ============================================================
   МІНІ Markdown -> HTML (заголовків усередині відповідей немає).
   Плейсхолдер @@@N@@@ (не містить \w) захищає код/рядки від
   подальшого форматування — не трапляється в реальному контенті.
   ============================================================ */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlight(code, lang){
  let s = esc(code);
  const store = [];
  const stash = (cls, txt) => { store.push('<span class="t-'+cls+'">'+txt+'</span>');
    return '@@@'+(store.length-1)+'@@@'; };
  const isSql = /sql/i.test(lang);
  const hashLang = /ya?ml|bash|sh|dockerfile|ini|toml|env|nginx/i.test(lang);
  // коментарі (спершу — щоб не чіпати рядки/ключові слова всередині)
  s = s.replace(/\/\/[^\n]*/g, m => stash('c', m));
  if(isSql) s = s.replace(/--[^\n]*/g, m => stash('c', m));
  if(hashLang) s = s.replace(/(^|\n)([^\n]*?)(#[^\n]*)/g, (m,a,b,c) =>
    a + b + (/["'`]/.test(b) ? c : stash('c', c)));
  // рядки
  s = s.replace(/"[^"\n]*"|'[^'\n]*'|`[^`]*`/g, m => stash('s', m));
  // ключові слова (числа не підсвічуємо навмисно — уникаємо колізій)
  if(isSql){
    s = s.replace(/\b(select|from|where|join|left|right|inner|outer|full|group|by|order|having|insert|into|values|update|set|delete|create|alter|drop|table|view|index|primary|key|foreign|references|constraint|on|and|or|not|null|with|as|distinct|limit|offset|case|when|then|else|end|over|partition|between|like|ilike|in|exists|union|all|desc|asc|begin|commit|rollback|returning|default|check|unique|serial|integer|boolean|timestamp|numeric)\b/gi,
      m => '<span class="t-k">'+m+'</span>');
  }else{
    s = s.replace(/\b(const|let|var|function|return|if|else|for|while|do|await|async|import|from|export|class|extends|new|try|catch|finally|throw|typeof|instanceof|interface|type|enum|namespace|public|private|protected|readonly|static|abstract|implements|as|of|in|void|null|undefined|true|false|this|super|default|case|switch|break|continue|yield|get|set|declare|keyof|infer|satisfies)\b/g,
      m => '<span class="t-k">'+m+'</span>');
  }
  s = s.replace(/@@@(\d+)@@@/g, (m,i) => store[i]);
  return s;
}

function inline(str){
  const codes = [];
  // спершу винести inline-код, щоб не форматувати всередині
  str = str.replace(/`([^`]+)`/g, (m,c) => { codes.push(c); return '@@@'+(codes.length-1)+'@@@'; });
  str = esc(str);
  str = str.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
    (m,t,u) => '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>');
  str = str.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  str = str.replace(/\*(?!\s)([^*\n]+?)(?<!\s)\*/g, '<em>$1</em>');
  str = str.replace(/@@@(\d+)@@@/g, (m,i) => '<code>'+esc(codes[i])+'</code>');
  return str;
}

function codeBlock(code, lang){
  const label = lang ? '<span class="lang">'+esc(lang)+'</span>' : '';
  return '<div class="code">'+label+'<pre><code>'+highlight(code, lang)+'</code></pre></div>';
}

function listBlock(lines){
  const toks = [];
  for(const l of lines){
    const m = l.match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
    if(m) toks.push({indent:Math.floor(m[1].length/2), ordered:/\d/.test(m[2]), text:m[3]});
    else if(toks.length) toks[toks.length-1].text += ' ' + l.trim();
  }
  if(!toks.length) return '';
  let idx = 0;
  function build(level){
    const ordered = toks[idx].ordered;
    let out = ordered ? '<ol>' : '<ul>';
    while(idx < toks.length && toks[idx].indent >= level){
      if(toks[idx].indent > level){ out += build(toks[idx].indent); continue; }
      const t = toks[idx].text; idx++;
      let sub = '';
      if(idx < toks.length && toks[idx].indent > level) sub = build(toks[idx].indent);
      out += '<li>'+inline(t)+sub+'</li>';
    }
    return out + (ordered ? '</ol>' : '</ul>');
  }
  return build(toks[0].indent);
}

function tableBlock(rows){
  const cells = r => r.replace(/^\s*\|?/,'').replace(/\|?\s*$/,'').split('|').map(c=>c.trim());
  const head = cells(rows[0]);
  let h = '<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>';
  for(let i=1;i<rows.length;i++)
    h += '<tr>'+cells(rows[i]).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>';
  return h+'</tbody></table>';
}

function renderMarkdown(mdText){
  const lines = mdText.replace(/\r/g,'').split('\n');
  let html = '', i = 0;
  while(i < lines.length){
    const line = lines[i];
    if(line.trim() === ''){ i++; continue; }
    let fm = line.match(/^```(\w+)?\s*$/);
    if(fm){
      const lang = fm[1] || ''; i++;
      const buf = [];
      while(i < lines.length && !/^```\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++; html += codeBlock(buf.join('\n'), lang); continue;
    }
    if(/^(---+|\*\*\*+)\s*$/.test(line)){ html += '<hr>'; i++; continue; }
    if(line.includes('|') && i+1 < lines.length &&
       /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')){
      const rows = [line]; i += 2;
      while(i < lines.length && lines[i].includes('|') && lines[i].trim() !== ''){ rows.push(lines[i]); i++; }
      html += tableBlock(rows); continue;
    }
    if(/^>\s?/.test(line)){
      const buf = [];
      while(i < lines.length && /^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,'')); i++; }
      html += '<blockquote>'+renderMarkdown(buf.join('\n'))+'</blockquote>'; continue;
    }
    if(/^\s*([-*+]|\d+[.)])\s+/.test(line)){
      const buf = [];
      while(i < lines.length && lines[i].trim() !== '' &&
            (/^\s*([-*+]|\d+[.)])\s+/.test(lines[i]) || /^\s{2,}\S/.test(lines[i]))){
        buf.push(lines[i]); i++;
      }
      html += listBlock(buf); continue;
    }
    const buf = [];
    while(i < lines.length && lines[i].trim() !== '' &&
          !/^```/.test(lines[i]) && !/^\s*([-*+]|\d+[.)])\s+/.test(lines[i]) &&
          !/^>/.test(lines[i]) && !/^(---+|\*\*\*+)\s*$/.test(lines[i])){
      buf.push(lines[i]); i++;
    }
    html += '<p>'+inline(buf.join(' '))+'</p>';
  }
  return html;
}
const mdCache = {};
function md(k, text){ return mdCache[k] || (mdCache[k] = renderMarkdown(text)); }

// Блок «🎯 Відповідь на іспиті» — еталон усної відповіді (поле q.exam,
// збірка гарантує його наявність). Ключ кеша '#exam' не перетинається
// з ключами повних відповідей (там 'section:QN').
function examHtml(key, q){
  return '<div class="exam"><div class="exam-label">'+ICONS.target+' Відповідь на іспиті</div>'+
    md(key+'#exam', q.exam)+'</div>';
}

// ============ Реєстр векторних іконок (Lucide-стиль) ============
// Єдине джерело правди для всіх іконок інтерфейсу. Inline SVG,
// stroke=currentColor — колір успадковується від тексту/кнопки й працює
// в обох темах. Емодзі прибрано, щоб вигляд не залежав від шрифту ОС.
// Статичні місця позначені атрибутом data-icon="<назва>" і заповнюються
// paintIcons(); JS-рендер вставляє ICONS.<назва> напряму в розмітку.
const SVG_ATTRS = 'viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"';
const ICON_PATHS = {
  'copy':'<rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  'check':'<polyline points="20 6 9 17 4 12"/>',
  'log-out':'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
  'sun':'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>',
  'moon':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
  'arrow-left':'<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  'book-open':'<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
  'layers':'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
  'check-square':'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  'search':'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  'target':'<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  'shuffle':'<path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/>',
  'rotate-ccw':'<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>',
  'folder':'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
  'eye-off':'<path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 10 8 10 8a13.2 13.2 0 0 1-1.67 2.68"/><path d="M6.6 6.6A13.5 13.5 0 0 0 2 12s3 8 10 8a9.7 9.7 0 0 0 5.4-1.6"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="2" y1="2" x2="22" y2="22"/>'
};
const ICONS = {};
for(const k in ICON_PATHS){ ICONS[k] = '<svg '+SVG_ATTRS+'>'+ICON_PATHS[k]+'</svg>'; }
// Заповнює всі статичні [data-icon] у переданому корені (типово — весь документ).
function paintIcons(root){
  (root || document).querySelectorAll('[data-icon]').forEach(el=>{
    const name = el.dataset.icon;
    if(ICONS[name]) el.innerHTML = ICONS[name];
  });
}
const ICON_COPY = ICONS.copy, ICON_CHECK = ICONS.check;

// Текст питання для копіювання: заголовок + еталонна відповідь (q.exam),
// fenced-блоки коду (```…```) — те, що renderMarkdown() рендерить як
// блок коду, — замінюємо плейсхолдером; інлайн-`код` лишаємо (короткі
// ідентифікатори, не лістинги). Ціль — вставити ментору або в чат LLM.
function stripCodeBlocks(text){
  return (text || '').replace(/```[\s\S]*?```/g, '[код пропущено]')
    .replace(/\n{3,}/g, '\n\n').trim();
}
function copyQuestionText(q, btn){
  const txt = 'Питання: ' + q.title.trim() + '\n\n' + stripCodeBlocks(q.exam);
  const done = ()=>{
    btn.innerHTML = ICON_CHECK; btn.classList.add('copied');
    setTimeout(()=>{ btn.innerHTML = ICON_COPY; btn.classList.remove('copied'); }, 1200);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else {
    fallbackCopy(txt, done);
  }
}
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); } finally { ta.remove(); }
}

/* ============================================================
   ЗАГАЛЬНИЙ ПРОГРЕС
   ============================================================ */
function refreshProgress(){
  const total = DATA.totals.questions;
  const known = knownCount();
  const pct = total ? Math.round(known/total*100) : 0;
  $('#ring').style.setProperty('--p', pct);
  $('#ringPct').textContent = pct+'%';
  $('#knownN').textContent = known;
  $('#totalN').textContent = total;
  document.querySelectorAll('.cat').forEach(el=>{
    const key = el.dataset.key;
    const cat = DATA.categories.find(c=>c.key===key);
    if(!cat) return;
    const kn = cat.questions.filter(q=>qstatus(qkey(cat,q))==='known').length;
    const bar = el.querySelector('.mini i');
    if(bar) bar.style.width = (cat.questions.length?kn/cat.questions.length*100:0)+'%';
    const m = el.querySelector('.cat-count');
    if(m) m.textContent = kn+' / '+cat.questions.length;
  });
}

/* ============================================================
   ЧИТАЛКА
   ============================================================ */
let filter = {cats:new Set(DATA.categories.map(c=>c.key)), depths:new Set(DEPTH_ORDER),
  search:'', hideKnown:false};

function buildChips(){
  const cc = $('#catChips');
  cc.innerHTML = '';
  DATA.categories.forEach(cat=>{
    const b = document.createElement('button');
    b.className = 'chip';
    b.innerHTML = '<span class="dot" style="background:'+CAT_COLOR[cat.key]+'"></span>'+
      cat.name+' <span class="n">'+cat.questions.length+'</span>';
    b.onclick = () => { toggleSet(filter.cats, cat.key); b.classList.toggle('off'); renderReader(); };
    cc.appendChild(b);
  });
  const dc = $('#depthChips');
  dc.innerHTML = '';
  DEPTH_ORDER.forEach(d=>{
    const cnt = DATA.totals.depth[d];
    const b = document.createElement('button');
    b.className = 'chip';
    b.innerHTML = '<span class="dot '+d+'"></span>'+DEPTH_LABEL[d]+' <span class="n">'+cnt+'</span>';
    b.onclick = () => { toggleSet(filter.depths, d); b.classList.toggle('off'); renderReader(); };
    dc.appendChild(b);
  });
}
function toggleSet(set, v){ set.has(v) ? set.delete(v) : set.add(v); }

function matchQ(cat, q){
  if(!filter.cats.has(cat.key)) return false;
  if(!filter.depths.has(q.depth)) return false;
  if(filter.hideKnown && qstatus(qkey(cat,q))==='known') return false;
  if(filter.search){
    const s = filter.search.toLowerCase();
    if(!(q.title.toLowerCase().includes(s) || q.md.toLowerCase().includes(s) ||
         (q.exam||'').toLowerCase().includes(s))) return false;
  }
  return true;
}

const STATUS_CYCLE = {new:'learning', learning:'known', known:'new'};
const STATUS_TXT = {new:'○ нове', learning:'◐ вчу', known:'✓ знаю'};

function renderReader(){
  const root = $('#readerList');
  root.innerHTML = '';
  let shown = 0;
  DATA.categories.forEach(cat=>{
    const qs = cat.questions.filter(q=>matchQ(cat,q));
    if(!qs.length) return;
    shown += qs.length;
    const known = cat.questions.filter(q=>qstatus(qkey(cat,q))==='known').length;
    const el = document.createElement('div');
    el.className = 'cat'; el.dataset.key = cat.key;
    if(state['open_'+cat.key]!==true) el.classList.add('closed');
    el.innerHTML =
      '<div class="cat-head">'+
        '<span class="cat-bar" style="background:'+CAT_COLOR[cat.key]+'"></span>'+
        '<span class="cat-name">'+cat.name+'</span>'+
        '<span class="cat-meta"><span class="cat-count">'+known+' / '+cat.questions.length+'</span>'+
          '<span class="mini"><i style="width:'+(cat.questions.length?known/cat.questions.length*100:0)+'%"></i></span></span>'+
        '<span class="chev">▼</span>'+
      '</div><div class="items"></div>';
    const items = el.querySelector('.items');
    qs.forEach(q=>{
      const k = qkey(cat,q);
      const st = qstatus(k);
      const qEl = document.createElement('div');
      qEl.className = 'q';
      qEl.dataset.k = k;
      qEl.innerHTML =
        '<div class="q-head">'+
          '<span class="dbadge '+q.depth+'" title="'+DEPTH_LABEL[q.depth]+'"></span>'+
          '<span class="q-title"><span class="id">'+q.id+'</span>'+esc(q.title)+'</span>'+
          '<button class="copy-btn" type="button" title="Скопіювати текст питання (без коду)" aria-label="Скопіювати текст питання">'+ICON_COPY+'</button>'+
          '<button class="status '+(st!=='new'?st:'')+'">'+STATUS_TXT[st]+'</button>'+
        '</div>'+
        '<div class="answer md"></div>';
      const head = qEl.querySelector('.q-head');
      const ans = qEl.querySelector('.answer');
      const stBtn = qEl.querySelector('.status');
      const copyBtn = qEl.querySelector('.copy-btn');
      copyBtn.onclick = (e)=>{ e.stopPropagation(); copyQuestionText(q, copyBtn); };
      head.onclick = (e)=>{
        if(e.target === stBtn || e.target === copyBtn) return;
        if(!ans.innerHTML) ans.innerHTML = examHtml(k, q) + md(k, q.md);
        const willClose = qEl.classList.contains('open');
        qEl.classList.toggle('open');
        if(willClose){
          // закриваємо приліплений заголовок — лишаємось на цьому ж запитанні, без стрибка
          const offset = parseInt(getComputedStyle(document.documentElement)
            .getPropertyValue('--stick-top')) || 86;
          const top = qEl.getBoundingClientRect().top; // вже з урахуванням згорнутого layout
          if(top < offset) window.scrollTo({top: scrollY + top - offset});
        }else{
          // відкрили — підвозимо запитання під топбар, звідти воно й читається:
          // заголовок пришпилюється (sticky), відповідь починається одразу під ним
          scrollQuestionToTop(qEl);
        }
      };
      stBtn.onclick = (e)=>{
        e.stopPropagation();
        const ns = STATUS_CYCLE[qstatus(k)];
        setStatus(k, ns);
        stBtn.className = 'status '+(ns!=='new'?ns:'');
        stBtn.textContent = STATUS_TXT[ns];
      };
      items.appendChild(qEl);
    });
    el.querySelector('.cat-head').onclick = (e)=>{
      if(e.target.closest('.status')) return;
      el.classList.toggle('closed');
      state['open_'+cat.key] = !el.classList.contains('closed');
      save();
    };
    root.appendChild(el);
  });
  if(!shown){
    root.innerHTML = '<div class="empty"><div class="big">'+ICONS.search+'</div>Нічого не знайдено — спробуй змінити фільтри або пошук.</div>';
  }
}

/* ============================================================
   ФЛЕШ-КАРТКИ
   ============================================================ */
let deckFilter = {cat:'all', depth:'all', onlyNew:false, shuffle:false};
// revealed — показано еталон «🎯 Відповідь на іспиті» (мішень самоперевірки);
// fullShown — додатково розгорнуто повний міні-урок (за кнопкою)
let deck = [], deckIdx = 0, revealed = false, fullShown = false;

function buildDeckControls(){
  const c = $('#deckControls');
  c.innerHTML = '';
  const catSel = document.createElement('select');
  catSel.className = 'mini-btn';
  catSel.innerHTML = '<option value="all">Усі категорії</option>'+
    DATA.categories.map(x=>'<option value="'+x.key+'">'+x.name+'</option>').join('');
  catSel.value = deckFilter.cat;
  catSel.onchange = ()=>{ deckFilter.cat = catSel.value; rebuildDeck(); };

  const depSel = document.createElement('select');
  depSel.className = 'mini-btn';
  depSel.innerHTML = '<option value="all">Усі рівні</option>'+
    DEPTH_ORDER.map(d=>'<option value="'+d+'">'+DEPTH_LABEL[d]+'</option>').join('');
  depSel.value = deckFilter.depth;
  depSel.onchange = ()=>{ deckFilter.depth = depSel.value; rebuildDeck(); };

  const onlyNew = document.createElement('button');
  onlyNew.type = 'button';
  onlyNew.className = 'chip chip-toggle' + (deckFilter.onlyNew ? ' on' : '');
  onlyNew.style.margin = '0';
  onlyNew.setAttribute('aria-pressed', deckFilter.onlyNew ? 'true' : 'false');
  onlyNew.innerHTML = '<span class="chip-ic">'+ICONS['eye-off']+'</span> лише невивчені';
  onlyNew.onclick = ()=>{
    deckFilter.onlyNew = !deckFilter.onlyNew;
    onlyNew.classList.toggle('on', deckFilter.onlyNew);
    onlyNew.setAttribute('aria-pressed', deckFilter.onlyNew ? 'true' : 'false');
    rebuildDeck();
  };

  const shuffleBtn = document.createElement('button');
  shuffleBtn.className = 'mini-btn';
  shuffleBtn.innerHTML = ICONS.shuffle + ' перемішати';
  shuffleBtn.onclick = ()=>{ deckFilter.shuffle = true; rebuildDeck(); };

  const restartBtn = document.createElement('button');
  restartBtn.className = 'mini-btn';
  restartBtn.innerHTML = ICONS['rotate-ccw'] + ' спочатку';
  restartBtn.onclick = ()=>{ deckFilter.shuffle = false; rebuildDeck(); };

  c.append(catSel, depSel, onlyNew, shuffleBtn, restartBtn);
}

function rebuildDeck(){
  deck = [];
  DATA.categories.forEach(cat=>{
    if(deckFilter.cat!=='all' && cat.key!==deckFilter.cat) return;
    cat.questions.forEach(q=>{
      if(deckFilter.depth!=='all' && q.depth!==deckFilter.depth) return;
      if(deckFilter.onlyNew && qstatus(qkey(cat,q))==='known') return;
      deck.push({cat, q, key:qkey(cat,q)});
    });
  });
  if(deckFilter.shuffle){
    for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=deck[i]; deck[i]=deck[j]; deck[j]=t; }
  }
  deckIdx = 0; revealed = false; fullShown = false;
  renderCard();
}

function renderCard(){
  const area = $('#deckArea');
  const total = deck.length;
  const knownInDeck = deck.filter(c=>qstatus(c.key)==='known').length;
  $('#deckKnown').textContent = '✓ '+knownInDeck;
  if(!total){
    area.innerHTML = '<div class="empty"><div class="big">'+ICONS.folder+'</div>Колода порожня для цих фільтрів.</div>';
    $('#deckPos').textContent = '0 / 0'; $('#deckProg').style.width='0%'; return;
  }
  if(deckIdx >= total){
    area.innerHTML = '<div class="empty"><div class="big">🎉</div>Колоду пройдено!<br><br>'+
      '<button class="btn primary" style="max-width:220px;margin:0 auto" id="againBtn">Пройти ще раз</button></div>';
    $('#deckPos').textContent = total+' / '+total; $('#deckProg').style.width='100%';
    $('#againBtn').onclick = ()=>{ deckIdx=0; revealed=false; renderCard(); };
    return;
  }
  $('#deckPos').textContent = (deckIdx+1)+' / '+total;
  $('#deckProg').style.width = (deckIdx/total*100)+'%';
  const item = deck[deckIdx];
  const cat = item.cat, q = item.q, key = item.key;
  const st = qstatus(key);
  area.innerHTML =
    '<div class="card">'+
      '<div class="card-top">'+
        '<span class="pill" style="border-color:'+CAT_COLOR[cat.key]+';color:'+CAT_COLOR[cat.key]+'">'+cat.name+'</span>'+
        '<span class="pill depth"><span class="dbadge '+q.depth+'"></span>'+DEPTH_LABEL[q.depth]+'</span>'+
        (st==='known'?'<span class="pill" style="color:var(--good);border-color:var(--good)">✓ знаю</span>':'')+
      '</div>'+
      '<div class="card-q"><span style="font-family:var(--mono);font-size:.7em;color:var(--mute)">'+q.id+'&nbsp;&nbsp;</span>'+esc(q.title)+'</div>'+
      (revealed
        // текст відповіді скролиться в межах .card-a; кнопку «Повний розбір»
        // виносимо ПОЗА скрол-зону, щоб вона не ховалась під нижнім краєм
        ? '<div class="card-a md">'+examHtml(key,q)+(fullShown?md(key,q.md):'')+'</div>'+
          (fullShown?'':'<div class="full-toggle"><button class="mini-btn" id="fullBtn">'+ICONS['book-open']+' Повний розбір</button></div>')
        : '<div class="reveal-hint">Спробуй відповісти вголос, тоді звір з еталоном ↓</div>')+
      (revealed
        ? '<div class="deck-actions">'+
            '<button class="btn repeat" id="repeatBtn">'+ICONS['rotate-ccw']+' Повторити <kbd>1</kbd></button>'+
            '<button class="btn know" id="knowBtn">'+ICONS.check+' Знаю <kbd>2</kbd></button>'+
          '</div>'
        : '<div class="deck-actions"><button class="btn primary" id="revealBtn">Показати відповідь <kbd>Space</kbd></button></div>')+
    '</div>';

  if(revealed){
    $('#repeatBtn').onclick = ()=>{ setStatus(key,'learning'); const c=deck.splice(deckIdx,1)[0]; deck.push(c); revealed=false; fullShown=false; renderCard(); };
    $('#knowBtn').onclick = ()=>{ setStatus(key,'known'); deckIdx++; revealed=false; fullShown=false; renderCard(); };
    const fb = $('#fullBtn');
    if(fb) fb.onclick = ()=>{ fullShown=true; renderCard(); };
  }else{
    $('#revealBtn').onclick = ()=>{ revealed=true; fullShown=false; renderCard(); };
  }
}

/* ============================================================
   ЧЕКЛИСТ
   ============================================================ */
function chkKey(ci, ii){ return ci+':'+ii; }
function renderCheck(){
  const root = $('#checkList');
  root.innerHTML = '';
  let done = 0, total = 0;
  DATA.checklist.forEach((cat, ci)=>{
    const el = document.createElement('div');
    el.className = 'chk-cat';
    let catDone = 0;
    const rows = cat.items.map((it, ii)=>{
      total++;
      const k = chkKey(ci,ii);
      const on = !!state.chk[k];
      if(on){ done++; catDone++; }
      // чипи питань, що покривають пункт: колір = статус вивчення, клік = перехід у читалку
      const refs = (it.qs||[]).filter(r=>Q_BY_KEY[r]);
      const refsHtml = refs.length
        ? '<span class="chk-refs">'+refs.map(r=>{
            const hit = Q_BY_KEY[r];
            const st = qstatus(r);
            return '<button class="qref'+(st!=='new'?' '+st:'')+'" data-key="'+r+'" '+
              'title="'+esc(hit.cat.name+' · '+hit.q.title)+'">'+
              STATUS_TXT[st].charAt(0)+' '+hit.q.id+'</button>';
          }).join('')+'</span>'
        : '';
      return '<div class="chk-item'+(on?' done':'')+'" data-k="'+k+'">'+
        '<span class="chk-box">✓</span>'+
        '<span class="chk-text"><span class="dbadge '+it.depth+'" title="'+DEPTH_LABEL[it.depth]+'"></span>'+esc(it.text)+refsHtml+'</span>'+
      '</div>';
    }).join('');
    el.innerHTML =
      '<div class="cat-head" style="cursor:default">'+
        '<span class="cat-name">'+esc(cat.name)+'</span>'+
        '<span class="cat-meta">'+catDone+' / '+cat.items.length+'</span>'+
      '</div>'+rows;
    root.appendChild(el);
  });
  $('#chkDone').textContent = done;
  $('#chkTotal').textContent = total;
  root.querySelectorAll('.chk-item').forEach(row=>{
    row.onclick = ()=>{
      const k = row.dataset.k;
      if(state.chk[k]) delete state.chk[k]; else state.chk[k]=true;
      saveProgress(); renderCheck();
    };
  });
  root.querySelectorAll('.qref').forEach(btn=>{
    btn.onclick = e=>{ e.stopPropagation(); openQuestion(btn.dataset.key); };
  });
}

/* ============================================================
   ВКЛАДКИ / ТЕМА / ЛІЧИЛЬНИКИ
   ============================================================ */
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+name));
  state.tab = name; save();
  if(name==='cards' && !deck.length) rebuildDeck();
  if(name==='check') renderCheck(); // освіжити кольори чипів питань після навчання
}
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme);
  localStorage.setItem(THEME_KEY, state.theme);
  // показуємо іконку «пункту призначення»: у темній темі — сонце (перемкнути
  // на світлу), у світлій — місяць (перемкнути на темну)
  $('#themeBtn').innerHTML = state.theme==='dark' ? ICONS.sun : ICONS.moon;
}

// синхронізує вигляд чипа-перемикача «приховати вивчені» зі станом filter.hideKnown
function syncHideKnownChip(){
  const b = $('#hideKnown');
  if(!b) return;
  b.classList.toggle('on', filter.hideKnown);
  b.setAttribute('aria-pressed', filter.hideKnown ? 'true' : 'false');
}

function init(){
  paintIcons(); // заповнити всі статичні [data-icon] векторними SVG
  const total = DATA.totals.questions;
  $('#cntReader').textContent = total;
  $('#cntCards').textContent = total;
  $('#cntCheck').textContent = DATA.checklist.reduce((a,c)=>a+c.items.length,0);

  buildChips();
  buildDeckControls();
  renderReader();
  renderCheck();
  refreshProgress();
  applyTheme();

  // висота липкого топбару → офсет для липких заголовків відкритих запитань
  const syncStickTop = ()=>{
    const tb = document.querySelector('.topbar');
    if(tb) document.documentElement.style.setProperty('--stick-top', tb.offsetHeight+'px');
  };
  syncStickTop();
  window.addEventListener('resize', syncStickTop);

  $('#search').oninput = e=>{ filter.search = e.target.value.trim(); renderReader(); };
  $('#hideKnown').onclick = ()=>{ filter.hideKnown = !filter.hideKnown; syncHideKnownChip(); renderReader(); };
  document.querySelectorAll('.tab').forEach(t=>t.onclick = ()=>switchTab(t.dataset.tab));
  $('#themeBtn').onclick = ()=>{ state.theme = state.theme==='dark'?'light':'dark'; applyTheme(); save(); };
  $('#logoutBtn').onclick = async ()=>{
    // Дотиснути незбережені зміни перед виходом; якщо не вдалося
    // (офлайн / сесія вже мертва) — вирішує людина.
    let pushed = true;
    if(syncArmed){ clearTimeout(syncTimer); pushed = await pushNow(); }
    if(!pushed && !confirm('Останні зміни не збережено на сервері. Вийти все одно?')) return;
    clearLocalProgress();
    localStorage.removeItem(OWNER_KEY);
    // Вбудований logout Cloudflare Access: стирає кукі сесії,
    // наступний візит показує форму входу.
    location.href = '/cdn-cgi/access/logout';
  };
  $('#resetBtn').onclick = e=>{
    e.preventDefault();
    if(confirm('Скинути весь прогрес (статуси питань і чеклист)?')){
      state = {theme:state.theme, tab:state.tab, q:{}, chk:{}};
      saveProgress(); renderReader(); renderCheck(); refreshProgress(); rebuildDeck();
    }
  };
  document.addEventListener('keydown', e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
    if(state.tab==='cards'){
      // Space: спершу розкриває еталон, повторне натискання — повний розбір
      if(e.code==='Space'){ const b=$('#revealBtn')||$('#fullBtn'); if(b){ e.preventDefault(); b.click(); } }
      else if(e.key==='1'){ const b=$('#repeatBtn'); if(b) b.click(); }
      else if(e.key==='2'){ const b=$('#knowBtn'); if(b) b.click(); }
    }
  });

  // збережена вкладка могла зникнути з застосунку — тоді відкриваємо читалку
  const savedTab = state.tab || 'reader';
  switchTab(document.querySelector('.tab[data-tab="'+savedTab+'"]') ? savedTab : 'reader');
}
syncOnLoad().catch(()=>{}); // непередбачена помилка синку не має зупиняти застосунок
init();
})();
</script>
