# Claude у GitHub Actions: дозволяє звертатися до Claude коментарем
# "@claude" в Issues/PR цього репозиторію (питання по коду, рев'ю,
# невеликі правки). За замовчуванням Claude лише комітить у нову гілку
# і залишає посилання на створення PR — прямих комітів у main нема,
# рев'ю людиною лишається обов'язковим.
#
# УВАГА: без секрета CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets and
# variables → Actions; генерується локально командою `claude setup-token`,
# Pro/Max-підписка) цей workflow запускатиметься на @claude-згадки, але
# крок автентифікації Claude завершиться помилкою.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
